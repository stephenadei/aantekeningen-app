services:
  app:
    build:
      context: ../..
      dockerfile: projects/aantekeningen-app/Dockerfile
    container_name: aantekeningen-app
    # network_mode: host <-- REMOVED
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Overriding DATABASE_URL to verify SSOT connection
      - DATABASE_URL=postgresql://postgres:postgres@platform-postgres:5432/platform
      # MinIO configuration (use container name for internal Docker network)
      - MINIO_ENDPOINT=platform-minio
      - MINIO_PORT=9000
      - MINIO_SECURE=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - data-network

networks:
  data-network:
    external: true
